# 🚀 Custom Astro GitHub Pages Workflow
# Author: ChatGPT
# Simplified & improved version with friendly logs 😎

name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "."

jobs:
  test:
    name: 🧪 Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Hello guys — starting validation
        run: echo "Hello guys! Running validation before build..."

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧠 Detect package manager
        id: detect
        run: |
          if [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npm" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
          else
            echo "Unable to detect package manager"
            exit 1
          fi

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect.outputs.manager }}
          cache-dependency-path: ${{ env.BUILD_PATH }}/${{ steps.detect.outputs.lockfile }}

      - name: 📦 Install dependencies
        run: ${{ steps.detect.outputs.manager }} ${{ steps.detect.outputs.command }}

      - name: 🧹 Validate site
        run: |
          echo "Running validation..."
          ${{ steps.detect.outputs.runner }} run validate

  build:
    name: 🏗️ Build Astro Site
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Hello guys — starting the build
        run: echo "Hello guys! Building Astro site..."

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧠 Detect package manager
        id: detect
        run: |
          if [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
          else
            echo "Unable to detect package manager"
            exit 1
          fi

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect.outputs.manager }}
          cache-dependency-path: ${{ env.BUILD_PATH }}/${{ steps.detect.outputs.lockfile }}

      - name: ⚙️ Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: 📦 Install dependencies
        run: ${{ steps.detect.outputs.manager }} ${{ steps.detect.outputs.command }}

      - name: 🏗️ Build with Astro
        run: |
          echo "Building Astro project..."
          ${{ steps.detect.outputs.runner }} astro build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 🌐 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Done!
        run: echo "✅ Hello guys! Your Astro site is now live at ${{ steps.deployment.outputs.page_url }} 🎉"
